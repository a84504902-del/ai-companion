<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion - 夏雪</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>AI Companion</h2>
                <button class="btn-new-chat" onclick="newChat()">+ 新对话</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- 会话列表 -->
            </div>
            <div class="sidebar-footer">
                <a href="/admin" class="btn-admin">后台管理</a>
            </div>
        </aside>

        <!-- 主聊天区 -->
        <main class="main-content">
            <div class="chat-header">
                <div class="chat-title-area">
                    <h3 id="chatTitle">新对话</h3>
                    <button class="btn-rename" onclick="renameSession()" title="重命名">✏️</button>
                </div>
                <div class="chat-actions">
                    <select id="llmSelect" class="llm-select">
                        <option value="deepseek">加载中...</option>
                    </select>
                    <button id="ttsBtn" class="btn-tts active" onclick="toggleTTS()" title="语音播报">🔊</button>
                    <button onclick="summarizeChat()" title="生成摘要">📝 摘要</button>
                    <button onclick="clearChat()">清空</button>
                    <select id="exportFormat" class="llm-select">
                        <option value="json">JSON</option>
                        <option value="markdown">Markdown</option>
                        <option value="txt">TXT</option>
                    </select>
                    <button onclick="exportChat()">导出</button>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <!-- 消息列表 -->
            </div>
            <div class="chat-input">
                <textarea id="messageInput" placeholder="输入消息...（Shift+Enter 换行）" rows="1"></textarea>
                <button class="btn-send" onclick="sendMessage()">发送</button>
            </div>
        </main>

        <!-- 右侧面板 -->
        <aside class="right-panel" id="rightPanel">
            <div class="panel-tabs">
                <button class="tab-btn active" onclick="switchTab('memory')">记忆</button>
                <button class="tab-btn" onclick="switchTab('people')">人物</button>
                <button class="tab-btn" onclick="switchTab('relations')">关系</button>
                <button class="tab-btn" onclick="switchTab('prompt')">提示词</button>
                <button class="tab-btn" onclick="switchTab('search')">搜索</button>
            </div>
            <div class="panel-content">
                <div id="memoryPanel" class="tab-panel active"></div>
                <div id="peoplePanel" class="tab-panel"></div>
                <div id="relationsPanel" class="tab-panel"></div>
                <div id="promptPanel" class="tab-panel">
                    <div class="prompt-section">
                        <h4>系统提示词</h4>
                        <p class="prompt-hint">定义 AI 的角色和行为方式，每个对话独立配置</p>
                        <textarea id="systemPromptInput" class="prompt-textarea" rows="8" placeholder="例如：你是一个温柔体贴的AI伴侣，名叫夏雪..."></textarea>
                        <button class="btn-save-prompt" onclick="saveSystemPrompt()">保存提示词</button>

                        <div class="template-section">
                            <h4>提示词模板</h4>
                            <div class="template-actions">
                                <select id="templateSelect" class="input-sm" onchange="loadTemplate()">
                                    <option value="">选择模板...</option>
                                </select>
                                <button class="btn btn-primary btn-sm" onclick="useTemplate()">应用</button>
                                <button class="btn btn-sm" onclick="showAddTemplateModal()">新建</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="searchPanel" class="tab-panel">
                    <div class="search-section">
                        <div class="search-input-group">
                            <input type="text" id="searchInput" class="input-sm" placeholder="搜索聊天记录...">
                            <button class="btn btn-primary btn-sm" onclick="searchChat()">搜索</button>
                        </div>
                        <div id="searchResults"></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- 新建模板弹窗 -->
    <div class="modal" id="addTemplateModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建提示词模板</h3>
                <button class="modal-close" onclick="hideAddTemplateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>模板名称</label>
                    <input type="text" id="templateName" placeholder="例如：翻译助手">
                </div>
                <div class="form-group">
                    <label>提示词内容</label>
                    <textarea id="templatePrompt" class="prompt-textarea" rows="6" placeholder="输入提示词..."></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn" onclick="hideAddTemplateModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveTemplate()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
